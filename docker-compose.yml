services:
  postgres:
    image: postgres:16-alpine
    container_name: disciplineos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: disciplineos
      POSTGRES_PASSWORD: disciplineos
      POSTGRES_DB: disciplineos
    ports:
      - '5432:5432'
    volumes:
      - disciplineos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U disciplineos']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: disciplineos_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - disciplineos_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  disciplineos_pgdata:
  disciplineos_redisdata:
